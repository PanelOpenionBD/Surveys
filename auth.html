<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | OpenionBD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.box{
background:#1e293b;
padding:30px;
border-radius:12px;
width:320px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:none;
border-radius:6px;
background:#020617;
color:white;
}

button{
width:100%;
padding:12px;
background:#3b82f6;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>
</div>

<script src="auth.js"></script>

</body>
</html>
