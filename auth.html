<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login | OpenionBD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.box{
background:#1e293b;
padding:30px;
border-radius:10px;
width:300px;
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:6px;
}

button{
width:100%;
padding:10px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
margin-top:10px;
}

.signup{
margin-top:15px;
display:block;
color:#38bdf8;
text-decoration:none;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<a href="signup.html" class="signup">Create Account</a>
</div>

<script>

// Skip login if already logged in
if(localStorage.getItem("isLoggedIn") === "true"){
    if(Date.now() < localStorage.getItem("expiry")){
        window.location.href = "dashboard.html";
    }
}

function generatePanelCode(){
    return "panel-" + Math.floor(Math.random() * 1000000);
}

function login(){
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let savedUser = localStorage.getItem("acc_username");
    let savedPass = localStorage.getItem("acc_password");

    if(username === savedUser && password === savedPass){

        let panel = generatePanelCode();
        let country = navigator.language || "en-US";
        let refresh = "01";
        let expiry = Date.now() + (24 * 60 * 60 * 1000);

        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("username", username);
        localStorage.setItem("panel", panel);
        localStorage.setItem("expiry", expiry);
        localStorage.setItem("country", country);
        localStorage.setItem("refresh", refresh);

        window.location.href = `dashboard.html?${panel}?accountfrom-${username}?${country}?refresh-${refresh}`;

    } else {
        alert("Invalid username or password");
    }
}

</script>

</body>
</html>
