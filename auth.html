<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login | OpenionBD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:#1e293b;
padding:30px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
outline:none;
background:#020617;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#3b82f6;
color:white;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#2563eb;
}

a{
margin-top:12px;
display:block;
color:#38bdf8;
text-decoration:none;
font-size:14px;
}
</style>
</head>

<body>

<div class="box">
<h2>Login</h2>

<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<a href="signup.html">Create account</a>
</div>

<script src="auth.js"></script>

</body>
</html>
