<!DOCTYPE html>
<html>
<head>
<title>Login</title>
</head>
<body>
<script src="auth.js"></script>
<h2>Login</h2>

<input type="text" id="username" placeholder="Enter username">
<button onclick="login()">Login</button>

<script>
function generatePanelCode(){
    return "panel-" + Math.floor(Math.random() * 1000000);
}

function login(){
    let username = document.getElementById("username").value;

    if(username === ""){
        alert("Enter username");
        return;
    }

    let panel = generatePanelCode();
    let country = navigator.language || "en-US";
    let refresh = "01";

    let expiry = Date.now() + (24 * 60 * 60 * 1000); // 24h

    // Save session
    localStorage.setItem("isLoggedIn", "true");
    localStorage.setItem("username", username);
    localStorage.setItem("panel", panel);
    localStorage.setItem("expiry", expiry);
    localStorage.setItem("country", country);
    localStorage.setItem("refresh", refresh);

    // Redirect with URL params
    window.location.href = `dashboard.html?${panel}?accountfrom-${username}?${country}?refresh-${refresh}`;
}

// Skip login if already logged in
if(localStorage.getItem("isLoggedIn") === "true"){
    if(Date.now() < localStorage.getItem("expiry")){
        window.location.href = "dashboard.html";
    }
}
</script>

</body>
</html>
