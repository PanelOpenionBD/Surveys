<!DOCTYPE html>
<html lang="en">
<head>
<title>OpenionBD - Earn Money with Surveys in Bangladesh</title>

<meta name="description" content="OpenionBD lets you earn rewards by completing surveys online in Bangladesh. Fast payouts and easy tasks.">

<meta name="keywords" content="earn money Bangladesh, survey site BD, online income BD">

<meta name="robots" content="index, follow">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenionBD Panel | Login</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* CONTAINER */
.container{
    display:flex;
    flex-wrap:wrap;
    background:#1e293b;
    border-radius:12px;
    overflow:hidden;
    width:900px;
    max-width:95%;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* HERO */
.hero{
    flex:1;
    background:#0f172a;
    padding:40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}
.hero h1{font-size:28px;margin-bottom:20px;color:#22c55e;}
.hero p{font-size:16px;color:#cbd5e1;line-height:1.6;}

/* LOGIN BOX */
.login-box{
    flex:1;
    background:#020617;
    padding:40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}
.login-box h2{text-align:center;margin-bottom:20px;}

.login-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
    border:none;
    background:#1e293b;
    color:white;
}

.login-box button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
}
.login-box button:hover{ background:#16a34a; }

.signup{
    display:block;
    margin-top:15px;
    color:#38bdf8;
    text-decoration:none;
    font-size:14px;
    text-align:center;
}

/* RESPONSIVE */
@media(max-width:768px){
    .container{flex-direction:column;}
    .hero,.login-box{padding:20px;}
}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="hero">
        <h1>OpenionBD Panel</h1>
        <p>
            Earn points by completing surveys, redeem rewards, and join our 
            community of survey takers. Sign in to start earning today!
        </p>
    </div>

    <!-- RIGHT SIDE -->
    <div class="login-box">
        <h2>Login</h2>

        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">

        <button onclick="login()">Login</button>

        <a href="signup.html" class="signup">Create Account</a>
    </div>

</div>

<script>

// Auto redirect if already logged in
if(localStorage.getItem("isLoggedIn") === "true"){
    let expiry = localStorage.getItem("expiry");

    if(Date.now() < expiry){
        window.location.href = "dashboard.html";
    } else {
        localStorage.clear();
    }
}

// Generate panel ID
function generatePanelCode(){
    return "panel-" + Math.floor(Math.random() * 1000000);
}

// Login function
function login(){
    let username = document.getElementById("username").value;
    let password = document.getElementById("password").value;

    let savedUser = localStorage.getItem("acc_username");
    let savedPass = localStorage.getItem("acc_password");

    if(username === savedUser && password === savedPass){

        let panel = generatePanelCode();
        let country = navigator.language || "en-US";
        let refresh = "01";
        let expiry = Date.now() + (24 * 60 * 60 * 1000);

        localStorage.setItem("isLoggedIn", "true");
        localStorage.setItem("username", username);
        localStorage.setItem("panel", panel);
        localStorage.setItem("expiry", expiry);
        localStorage.setItem("country", country);
        localStorage.setItem("refresh", refresh);

        window.location.href = `dashboard.html?${panel}?accountfrom-${username}?${country}?refresh-${refresh}`;

    } else {
        alert("cannot logged in please got to https://openionbd.2bd.net/auth.html");
    }
}

</script>

</body>
</html>
