<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OpenionBD | Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
display:flex;
background:#0f172a;
color:white;
min-height:100vh;
}

/* SIDEBAR */

.sidebar{
width:230px;
background:#020617;
padding:25px;
display:flex;
flex-direction:column;
}

.sidebar h2{
margin-bottom:30px;
}

.sidebar a{
text-decoration:none;
color:white;
padding:12px;
border-radius:6px;
margin-bottom:10px;
display:block;
transition:0.2s;
}

.sidebar a:hover{
background:#1e293b;
}

/* MAIN */

.main{
flex:1;
padding:40px;
}

/* TOP INFO BAR */

.topbar{
position:fixed;
top:0;
left:230px;
right:0;
background:#020617;
padding:10px;
font-size:13px;
display:flex;
justify-content:space-between;
align-items:center;
z-index:1000;
}

.logout-btn{
background:#ef4444;
border:none;
padding:6px 12px;
border-radius:6px;
color:white;
cursor:pointer;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-top:80px;
}

.card{
background:#1e293b;
padding:25px;
border-radius:10px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h3{
margin-bottom:10px;
}

.card p{
font-size:28px;
font-weight:bold;
color:#22c55e;
}

/* WELCOME */

.welcome{
margin-top:40px;
background:#1e293b;
padding:25px;
border-radius:10px;
line-height:1.6;
}

/* FOOTER */

footer{
position:fixed;
bottom:0;
left:230px;
right:0;
background:#020617;
padding:12px;
text-align:center;
font-size:14px;
}

</style>
</head>

<body>

<div class="sidebar">
<h2>OpenionBD</h2>

<a href="dashboard.html">Dashboard</a>
<a href="survey.html">Surveys</a>
<a href="redeem.html">Redeem</a>
</div>


<!-- TOP BAR -->
<div class="topbar" id="topbar">
Loading session...
<button class="logout-btn" onclick="logout()">Logout</button>
</div>


<div class="main">

<h1>Dashboard</h1>

<div class="stats">

<div class="card">
<h3>Total Points</h3>
<p id="points">520</p>
</div>

<div class="card">
<h3>Completed Surveys</h3>
<p>14</p>
</div>

<div class="card">
<h3>Available Surveys</h3>
<p>7</p>
</div>

</div>

<div class="welcome">
Welcome to <strong>OpenionBD</strong>.  
Complete surveys and earn points to redeem rewards.  
New surveys are added regularly — check the surveys page to start earning.
</div>

</div>

<footer>
© 2026 OpenionBD
</footer>

<script>

// 🔐 AUTH CHECK
let isLoggedIn = localStorage.getItem("isLoggedIn");
let expiry = localStorage.getItem("expiry");

if(isLoggedIn !== "true" || Date.now() > expiry){
    localStorage.clear();
    window.location.href = "auth.html";
}

// 📦 GET DATA
let username = localStorage.getItem("username");
let panel = localStorage.getItem("panel");
let country = localStorage.getItem("country");
let refresh = localStorage.getItem("refresh");

// 🧠 UPDATE TOPBAR
document.getElementById("topbar").innerHTML = `
Panel: ${panel} | 
User: ${username} | 
Country: ${country} | 
Refresh: ${refresh}
<button class="logout-btn" onclick="logout()">Logout</button>
`;

// 🔄 OPTIONAL: AUTO REFRESH BASED ON RATE
setInterval(() => {
    console.log("Auto refresh triggered");
}, refresh * 1000);


// 🔓 LOGOUT
function logout(){
    localStorage.clear();
    window.location.href = "auth.html";
}

</script>

</body>
</html>
