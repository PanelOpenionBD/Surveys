<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenionBD Panel | Login</title>
<style>
/* GLOBAL */
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#0f172a;color:white;height:100vh;display:flex;justify-content:center;align-items:center;}

/* CONTAINER */
.container{
    display:flex;
    flex-wrap:wrap;
    background:#1e293b;
    border-radius:12px;
    overflow:hidden;
    width:900px;
    max-width:95%;
    box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* HERO */
.hero{
    flex:1;
    background:#0f172a;
    padding:40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}
.hero h1{font-size:28px;margin-bottom:20px;color:#22c55e;}
.hero p{font-size:16px;color:#cbd5e1;line-height:1.6;}

/* LOGIN BOX */
.login-box{
    flex:1;
    background:#020617;
    padding:40px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}
.login-box h2{text-align:center;margin-bottom:20px;}
.login-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:6px;
    border:none;
    background:#1e293b;
    color:white;
}
.login-box button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#22c55e;
    color:white;
    font-size:16px;
    cursor:pointer;
}
.login-box button:hover{ background:#16a34a; }
.login-box .signup{
    display:block;
    margin-top:15px;
    color:#38bdf8;
    text-decoration:none;
    font-size:14px;
    text-align:center;
}
.login-box .error{
    color:#ef4444;
    font-size:13px;
    margin-top:10px;
    display:none;
}

/* RESPONSIVE */
@media(max-width:768px){
    .container{flex-direction:column;}
    .hero,.login-box{padding:20px;}
}
</style>
</head>
<body>

<div class="container">
    <div class="hero">
        <h1>OpenionBD Panel</h1>
        <p>Earn points by completing surveys, redeem rewards, and join our community of survey takers. Sign in to start earning today!</p>
   <div class="box">
<h2>Login</h2>

<input type="text" id="username" placeholder="Username">

<div class="input-group">
<input type="password" id="password" placeholder="Password">
<span class="show-pass" onclick="togglePassword()">Show</span>
</div>

<button onclick="login()">Login</button>

<div class="error" id="error">Invalid username or password</div>

<a href="signup.html" class="signup">Create Account</a>
</div>

<!-- JS FILE -->
<script src="auth.js"></script>

<script>

// 👁️ SHOW / HIDE PASSWORD
function togglePassword(){
    let pass = document.getElementById("password");
    if(pass.type === "password"){
        pass.type = "text";
    } else {
        pass.type = "password";
    }
}

// ❌ CUSTOM ERROR DISPLAY
function showError(){
    document.getElementById("error").style.display = "block";
}

// 🔁 OVERRIDE ALERT (OPTIONAL CLEAN UX)
const oldLogin = login;
login = function(){
    try{
        oldLogin();
    }catch(e){
        showError();
    }
};

</script>

</body>
</html>
