<style>
body {
  font-family: Arial, sans-serif;
  background: #f1f5f9;
  color: #111827;
  margin: 0;
  padding: 20px;
}

h1 {
  color: #22c55e;
  margin-bottom: 20px;
}

h2 {
  margin-top: 20px;
  color: #2563eb;
}

ul {
  margin-left: 20px;
}

a {
  color: #3b82f6;
  text-decoration: none;
}

a:hover {
  text-decoration: underline;
}
</style>
</head>

<body>

<h1 id="page-title">Loading...</h1>
<div id="content"></div>

<script>
// ✅ Data for JS rendering
const surveyData = {
  title: "Best Survey Sites in Bangladesh",
  intro: "If you want to earn money online, survey sites are one of the easiest ways in Bangladesh.",
  sites: [
    {
      name: "OpenionBD",
      description: "OpenionBD is a fast-growing platform where users can earn rewards by completing surveys.",
      benefits: ["Easy to use", "Fast rewards", "Designed for Bangladesh users"]
    },
    {
      name: "Other Survey Platforms",
      description: "Some international platforms are also available but may have limited surveys in Bangladesh."
    }
  ],
  backLink: {
    href: "index.html",
    text: "Back to Home"
  }
};

// ✅ Render content dynamically
document.getElementById("page-title").textContent = surveyData.title;

let contentDiv = document.getElementById("content");

// Intro paragraph
let intro = document.createElement("p");
intro.textContent = surveyData.intro;
contentDiv.appendChild(intro);

// Survey sites
surveyData.sites.forEach(site => {
  let h2 = document.createElement("h2");
  h2.textContent = site.name;
  contentDiv.appendChild(h2);

  let desc = document.createElement("p");
  desc.textContent = site.description;
  contentDiv.appendChild(desc);

  if(site.benefits){
    let ul = document.createElement("ul");
    site.benefits.forEach(item => {
      let li = document.createElement("li");
      li.textContent = item;
      ul.appendChild(li);
    });
    contentDiv.appendChild(ul);
  }
});

// Back link
let back = document.createElement("a");
back.href = surveyData.backLink.href;
back.textContent = surveyData.backLink.text;
contentDiv.appendChild(back);
</script>

</body>
