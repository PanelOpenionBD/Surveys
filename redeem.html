<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OpenionBD | Redeem</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

<style>
body{
display:flex;
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

/* SIDEBAR */
.sidebar{
width:230px;
background:#020617;
padding:25px;
}

.sidebar h2{margin-bottom:30px;}

.sidebar a{
display:block;
padding:12px;
color:white;
text-decoration:none;
border-radius:6px;
margin-bottom:10px;
}

.sidebar a:hover,
.sidebar .active{
background:#1e293b;
}

/* MAIN */
.main{
flex:1;
padding:40px;
}

/* TOPBAR */
.topbar{
position:fixed;
top:0;
left:230px;
right:0;
background:#020617;
padding:10px;
font-size:13px;
display:flex;
justify-content:space-between;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:80px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

.points{
margin:10px 0;
color:#22c55e;
font-weight:bold;
}

.btn{
display:block;
background:#22c55e;
padding:10px;
border-radius:6px;
text-decoration:none;
color:white;
margin-top:10px;
}

/* FOOTER */
footer{
position:fixed;
bottom:0;
left:230px;
right:0;
background:#020617;
text-align:center;
padding:10px;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>OpenionBD</h2>
<a href="dashboard.html">Dashboard</a>
<a href="survey.html">Surveys</a>
<a href="redeem.html" class="active">Redeem</a>
</div>

<div class="topbar" id="topbar">Loading...</div>

<div class="main">

<h1>Redeem Rewards</h1>

<div class="grid">

<div class="card">
<h3><i class="fab fa-paypal"></i> PayPal $5</h3>
<p class="points">500000 Points</p>
<a class="btn" href="#">Redeem</a>
</div>

<div class="card">
<h3><i class="fab fa-amazon"></i> Amazon Card</h3>
<p class="points">70000 Points</p>
<a class="btn" href="#">Redeem</a>
</div>

<div class="card">
<h3><i class="fab fa-discord"></i> Discord Nitro</h3>
<p class="points">700 Points</p>
<a class="btn" href="#">Redeem</a>
</div>

<div class="card">
<h3><i class="fab fa-google-play"></i> Play Card</h3>
<p class="points">600 Points</p>
<a class="btn" href="#">Redeem</a>
</div>

</div>

</div>

<footer>© 2026 OpenionBD</footer>

<script src="session.js"></script>
</body>
</html>
