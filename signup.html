<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup | OpenionBD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
font-family:Arial;
}

.box{
background:#1e293b;
padding:30px;
border-radius:12px;
width:320px;
text-align:center;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
background:#020617;
color:white;
}

button{
width:100%;
padding:12px;
background:#22c55e;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

a{
display:block;
margin-top:10px;
color:#38bdf8;
text-decoration:none;
}
</style>
</head>

<body>

<div class="box">
<h2>Signup</h2>

<input type="text" id="username" placeholder="Username">
<input type="email" id="email" placeholder="Email">
<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Signup</button>

<a href="auth.html">Login here</a>
</div>

<script src="signup.js"></script>

</body>
</html>
