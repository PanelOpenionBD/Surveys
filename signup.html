<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Signup | OpenionBD</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#0f172a;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

/* BOX */

.box{
background:#1e293b;
padding:30px;
border-radius:12px;
width:320px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.box h2{
margin-bottom:20px;
}

/* INPUT */

input{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:6px;
outline:none;
background:#020617;
color:white;
}

/* BUTTON */

button{
width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#22c55e;
color:white;
cursor:pointer;
font-size:16px;
transition:0.2s;
}

button:hover{
background:#16a34a;
}

/* LINK */

.login-link{
margin-top:15px;
display:block;
color:#38bdf8;
text-decoration:none;
font-size:14px;
}

</style>
</head>

<body>

<div class="box">
<h2>Create Account</h2>

<input type="text" id="username" placeholder="Username">
<input type="password" id="password" placeholder="Password">

<button onclick="signup()">Signup</button>

<a href="auth.html" class="login-link">Already have an account? Login</a>
</div>

<!-- LINK JS FILE -->
<script src="signup.js"></script>

</body>
</html>
