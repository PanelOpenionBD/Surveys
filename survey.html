<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenionBD | Surveys</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
<style>
body{
    display:flex;
    margin:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#0f172a;
    color:white;
    min-height:100vh;
}
/* SIDEBAR */
.sidebar{
    width:230px;
    background:#020617;
    padding:25px;
}
.sidebar h2{ margin-bottom:30px; }
.sidebar a{
    display:block;
    padding:12px;
    color:white;
    text-decoration:none;
    border-radius:6px;
    margin-bottom:10px;
}
.sidebar a:hover,
.sidebar .active{ background:#1e293b; }
/* TOPBAR */
.topbar{
    position:fixed;
    top:0;
    left:230px;
    right:0;
    height:50px;
    background:#020617;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 20px;
    font-size:14px;
}
/* MAIN */
.main{
    flex:1;
    padding:70px 40px 40px 40px;
}
/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
}
/* CARD */
.card{
    background:#1e293b;
    padding:20px;
    border-radius:10px;
    transition:0.3s;
}
.card:hover{ transform:translateY(-5px); }
.card h3{ margin-bottom:10px; font-size:16px; }
.points{
    color:#22c55e;
    font-size:22px;
    font-weight:bold;
    margin-bottom:10px;
}
.loi{
    color:#ccc;
    font-size:14px;
    margin-bottom:10px;
}
.btn{
    display:block;
    background:#22c55e;
    padding:10px;
    border-radius:6px;
    text-align:center;
    text-decoration:none;
    color:white;
}
/* FOOTER */
footer{
    position:fixed;
    bottom:0;
    left:230px;
    right:0;
    background:#020617;
    text-align:center;
    padding:10px;
    font-size:13px;
}
</style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h2>OpenionBD</h2>
    <a href="dashboard.html">Dashboard</a>
    <a href="survey.html" class="active">Surveys</a>
    <a href="redeem.html">Redeem</a>
</div>

<!-- TOPBAR -->
<div class="topbar" id="topbar">User: </div>

<!-- MAIN CONTENT -->
<div class="main">
    <h1>Available Surveys</h1>
    <div class="grid" id="surveyGrid"></div>
</div>

<footer>© 2026 OpenionBD</footer>

<script>
// Check if user is logged in
const loggedUser = localStorage.getItem("loggedInUser");
const topbar = document.getElementById("topbar");

if(!loggedUser){
    // Not logged in → redirect to login
    window.location.href = "index.html";
}else{
    topbar.textContent = `User: ${loggedUser}`;
}

// Survey data
const surveys=[
    { id:"SC48027114", points:120, loi:3, link:"https://screeningopenionbd.github.io/Screening.aspx.id-allcounted.com/" },
    { id:"SC48032391", points:122, loi:4, link:"https://screeningopenionbd.github.io/Screening.aspx.id-Google.com" },
    { id:"SC48043055", points:172, loi:5, link:"https://screeningopenionbd.github.io/Screening.aspx.id-Kantar.com/" },
    { id:"SC48068600", points:72, loi:4, link:"https://screeningopenionbd.github.io/Screening.aspx.id-SampleSurveys/" },
    { id:"SC48058356", points:24, loi:3, link:"https://screeningopenionbd.github.io/Screening.aspx.mysurveyvzRouting-01/" },
    { id:"SC48038128", points:54, loi:14, link:"https://panelopenionbd.github.io/router/" }
];

// Populate survey grid
const grid=document.getElementById("surveyGrid");
surveys.forEach(s=>{
    grid.innerHTML += `
    <div class="card">
        <h3>${s.id}</h3>
        <div class="points">${s.points} Points</div>
        <div class="loi">LOI: ${s.loi} min</div>
        <a href="${s.link}" target="_blank" class="btn">Start Survey</a>
    </div>
    `;
});
</script>

</body>
</html>
