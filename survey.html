<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OpenionBD | Surveys</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
display:flex;
background:#0f172a;
color:white;
font-family:Arial;
margin:0;
}

/* SIDEBAR */
.sidebar{
width:230px;
background:#020617;
padding:25px;
}

.sidebar h2{margin-bottom:30px;}

.sidebar a{
display:block;
padding:12px;
color:white;
text-decoration:none;
border-radius:6px;
margin-bottom:10px;
}

.sidebar a:hover,
.sidebar .active{
background:#1e293b;
}

/* MAIN */
.main{
flex:1;
padding:40px;
}

/* TOPBAR */
.topbar{
position:fixed;
top:0;
left:230px;
right:0;
background:#020617;
padding:10px;
font-size:13px;
display:flex;
justify-content:space-between;
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:80px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:10px;
}

.points{
color:#22c55e;
font-size:22px;
}

.loi{
margin-top:10px;
font-size:14px;
color:#ccc;
}

.btn{
display:block;
margin-top:15px;
background:#22c55e;
padding:10px;
border-radius:6px;
text-align:center;
text-decoration:none;
color:white;
}
</style>
</head>

<body>

<div class="sidebar">
<h2>OpenionBD</h2>
<a href="dashboard.html">Dashboard</a>
<a href="survey.html" class="active">Surveys</a>
<a href="redeem.html">Redeem</a>
</div>

<div class="topbar" id="topbar">Loading...</div>

<div class="main">

<h1>Available Surveys</h1>

<div class="grid" id="grid"></div>

</div>

<script>

const surveys=[
    { id:"SC48027114", points:120, loi:3, link:"https://screeningopenionbd.github.io/Screening.aspx.id-allcounted.com/" },
    { id:"SC48032391", points:122, loi:4, link:"https://screeningopenionbd.github.io/Screening.aspx.id-Google.com" },
    { id:"SC48043055", points:172, loi:5, link:"https://screeningopenionbd.github.io/Screening.aspx.id-Kantar.com/" },
    { id:"SC48068600", points:72, loi:4, link:"https://screeningopenionbd.github.io/Screening.aspx.id-SampleSurveys/" },
    { id:"SC48058356", points:24, loi:3, link:"https://samplecube.linkpc.net/session/125" },
    { id:"SC48038128", points:54, loi:14, link:"https://samplecube.linkpc.net/session/eror" }
];

const grid = document.getElementById("grid");

surveys.forEach(s=>{
grid.innerHTML += `
<div class="card">
<h3>${s.id}</h3>
<div class="points">${s.points} Points</div>
<div class="loi">LOI: ${s.loi} min</div>
<a href="${s.link}" class="btn">Start Survey</a>
</div>
`;
});

</script>

<script src="session.js"></script>

</body>
</html>
